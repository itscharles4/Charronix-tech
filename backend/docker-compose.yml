version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: charronix_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: charronix_db
      POSTGRES_USER: charronix_user
      POSTGRES_PASSWORD: charronix_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charronix_user -d charronix_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: charronix_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:
